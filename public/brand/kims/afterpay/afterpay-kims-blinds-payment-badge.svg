<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Afterpay payment badge for Kim's Blinds</title>
  <desc id="desc">Official Afterpay Bondi Mint badge displayed inside a Kim's Blinds graphite chrome and glass frame.</desc>
  <defs>
    <linearGradient id="outer-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.16" stop-color="#cfdae6"/>
      <stop offset="0.34" stop-color="#5a636e"/>
      <stop offset="0.53" stop-color="#04060a"/>
      <stop offset="0.76" stop-color="#c7c0b4"/>
      <stop offset="1" stop-color="#fffaf0"/>
    </linearGradient>
    <linearGradient id="graphite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.52" stop-color="#0d0f13"/>
      <stop offset="1" stop-color="#27313f"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.34" stop-color="#f7fbff" stop-opacity="0.32"/>
      <stop offset="0.7" stop-color="#0787f5" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ff9d13" stop-opacity="0.11"/>
    </linearGradient>
    <linearGradient id="inner-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0787f5" stop-opacity="0.88"/>
      <stop offset="0.55" stop-color="#f7fbff" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#ff9d13" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="panel-shadow" x="-8%" y="-12%" width="116%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#02091c" flood-opacity="0.32"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="none"/>
  <g filter="url(#panel-shadow)">
    <rect x="34" y="34" width="1132" height="352" rx="54" fill="url(#outer-rim)"/>
    <rect x="48" y="48" width="1104" height="324" rx="43" fill="url(#graphite)"/>
    <rect x="62" y="60" width="1076" height="300" rx="35" fill="url(#glass)" opacity="0.82"/>
    <path d="M84 92c98-24 268-34 520-34 224 0 392 11 508 32v58c-126-25-300-38-522-38-214 0-383 12-506 36Z" fill="#ffffff" opacity="0.16"/>
    <rect x="78" y="76" width="1044" height="268" rx="29" fill="none" stroke="url(#inner-line)" stroke-width="2" opacity="0.88"/>
  </g>
  <image href="./afterpay-badge-bondi-mint.svg" xlink:href="./afterpay-badge-bondi-mint.svg" x="250" y="88" width="700" height="244" preserveAspectRatio="xMidYMid meet"/>
